apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: loadgen
spec:
  template:
    metadata:
      labels:
        workload: loadgen
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      taints:
        - key: workload
          value: loadgen
          effect: NoSchedule
      requirements:
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: ["c", "m"]
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 10m
