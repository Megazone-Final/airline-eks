config:
  argocd:
    grpcWeb: true
    serverAddress: "http://argocd-server.argocd"
    insecure: true
    plaintext: true
  logLevel: debug
  git.user: argocd-image-updater
  git.email: argocd-image-updater@megazone.local
  git.commit-message-template: "chore: update image tags"
  registries:
    - name: ECR
      api_url: "https://036333380579.dkr.ecr.ap-northeast-2.amazonaws.com"
      prefix: "036333380579.dkr.ecr.ap-northeast-2.amazonaws.com"
      ping: true
      insecure: false
      credentials: "ext:/scripts/auth1.sh"
      credsexpire: 10h

authScripts:
  enabled: true
  scripts:
    auth1.sh: |
      #!/bin/sh
      # Argo CD Image Updater expects a single-line "<username>:<password>" value.
      printf 'AWS:%s' "$(aws ecr get-login-password --region ap-northeast-2)"

extraEnv:
  - name: HOME
    value: /tmp

serviceAccount:
  create: true
  name: argocd-image-updater
