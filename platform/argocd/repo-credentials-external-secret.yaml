# Expected AWS Secrets Manager secret shape:
# {"type":"git","url":"git@github.com:Megazone-Final/airline-eks.git","sshPrivateKey":"-----BEGIN OPENSSH PRIVATE KEY-----\n..."}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-airline-eks
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: repo-airline-eks
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      type: Opaque
      data:
        type: "{{ .type }}"
        url: "{{ .url }}"
        sshPrivateKey: "{{ .sshPrivateKey }}"
  data:
    - secretKey: type
      remoteRef:
        key: airline/argocd/github-airline-eks
        property: type
    - secretKey: url
      remoteRef:
        key: airline/argocd/github-airline-eks
        property: url
    - secretKey: sshPrivateKey
      remoteRef:
        key: airline/argocd/github-airline-eks
        property: sshPrivateKey
