name: Validate Kubernetes manifests

on:
    pull_request:
        branches: [main]
        paths:
            - "services/**"
            - "shared/**"
            - "platform/**"
            - "k6/k8s/**"
            - ".github/workflows/eks.yaml"
    push:
        branches: [main]
        paths:
            - "services/**"
            - "shared/**"
            - "platform/**"
            - "k6/k8s/**"
            - ".github/workflows/eks.yaml"

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install kubeconform
              run: |
                  curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
                  tar -xzf kubeconform.tar.gz
                  sudo mv kubeconform /usr/local/bin/

            - name: Collect manifest files
              run: |
                  find services shared platform k6/k8s -type f \( -name "*.yaml" -o -name "*.yml" \) | sort > manifests.txt
                  echo "Found $(wc -l < manifests.txt) manifest files"
                  test -s manifests.txt

            - name: Validate manifests
              run: xargs kubeconform -strict -summary -ignore-missing-schemas < manifests.txt
