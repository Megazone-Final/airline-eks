apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: svc-auth-hpa
  namespace: svc-auth
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: svc-auth
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max