apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: airline-auth
  labels:
    app: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      serviceAccountName: auth-sa
      containers:
        - name: auth
          image: 036333380579.dkr.ecr.ap-northeast-2.amazonaws.com/airline-backend/auth:latest
          ports:
            - containerPort: 3002          
          envFrom:
            - secretRef:
                name: auth-secret
          env:
            - name: DB_HOST
              value: "rds-airline-mysql-main.cluster-cb8q4mm6485z.ap-northeast-2.rds.amazonaws.com"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "auth_user"
            - name: DB_NAME
              value: "auth"
            - name: DB_IAM_AUTH
              value: "true"
            - name: DB_SSL_CA_PATH
              value: "/app/certs/global-bundle.pem"
            - name: AWS_REGION
              value: "ap-northeast-2"
            - name: PORT
              value: "3002"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
