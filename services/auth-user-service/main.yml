apiVersion: v1
kind: Service
metadata:
  name: svc-auth
  namespace: svc-auth
  labels:
    app: svc-auth
    component: backend
spec:
  type: ClusterIP
  selector:
    app: svc-auth
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-auth
  namespace: svc-auth
  labels:
    app: svc-auth
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: svc-auth
      component: backend
  template:
    metadata:
      labels:
        app: svc-auth
        component: backend
    spec:
      containers:
        - name: svc-auth
          image: 036333380579.dkr.ecr.ap-northeast-2.amazonaws.com/airline-backend/auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

              