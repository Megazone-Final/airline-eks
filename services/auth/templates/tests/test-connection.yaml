apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "auth.fullname" . }}-test-connection"
  namespace: {{ include "auth.namespace" . }}
  labels:
    {{- include "auth.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "auth.serviceName" . }}:{{ .Values.service.port }}']
  restartPolicy: Never
