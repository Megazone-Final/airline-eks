#
# auth-user-service raw manifest 기준 기본값
#
namespace: airline-auth
appName: auth

deployment:
  name: auth

container:
  name: auth
  port: 3000

replicaCount: 2

image:
  repository: 036333380579.dkr.ecr.ap-northeast-2.amazonaws.com/airline-backend/auth
  pullPolicy: Always
  tag: 1.0.1

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: auth-sa

podAnnotations:
  traffic.sidecar.istio.io/excludeOutboundIPRanges: "169.254.170.23/32"
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  name: svc-auth
  type: ClusterIP
  port: 3000
  targetPort: 3000

envFrom:
  - secretRef:
      name: auth-secret

env:
  - name: DB_IAM_AUTH
    value: "true"
  - name: AWS_STS_REGIONAL_ENDPOINTS
    value: regional
  - name: DB_CONNECTION_LIMIT
    value: "20"

resources:
  # 기존 auth-user-service 요청/제한값 유지
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi


livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: true
  name: auth-hpa
  minReplicas: 2
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max

volumes: []
volumeMounts: []



nodeSelector: {}

tolerations: []

affinity: {}
