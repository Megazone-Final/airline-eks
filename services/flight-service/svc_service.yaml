apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-deployment
  namespace: airline-flight
  labels:
    app: flight
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flight
  template:
    metadata:
      labels:
        app: flight
        tier: backend
    spec:
      containers:
      - name: flight
        image: 036333380579.dkr.ecr.ap-northeast-2.amazonaws.com/airline-backend/flights:latest
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: SERVICE_NAME
          value: "flight"
        - name: PORT
          value: "8080"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: svc-flight
  namespace: airline-flight
  labels:
    app: flight
spec:
  selector:
    app: flight
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP