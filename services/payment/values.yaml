#
# payment-service raw manifest 기준 기본값
#
namespace: airline-payment
appName: payment

deployment:
  name: payment

container:
  name: payment
  port: 3000

replicaCount: 1

image:
  repository: 036333380579.dkr.ecr.ap-northeast-2.amazonaws.com/airline-backend/payment
  pullPolicy: Always
  tag: latest

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: payment-sa

podAnnotations:
  traffic.sidecar.istio.io/excludeOutboundIPRanges: "169.254.170.23/32"

service:
  name: svc-payment
  type: ClusterIP
  port: 3000
  targetPort: 3000

envFrom:
  - secretRef:
      name: payments-secret

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  targetName: payments-secret
  remoteKey: airline/service/prod

env:
  - name: DB_USER
    value: payment_user
  - name: DB_NAME
    value: payment

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /livez
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /readyz
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: true
  name: payment-hpa
  minReplicas: 2
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
