apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "payment.fullname" . }}-test-connection"
  namespace: {{ include "payment.namespace" . }}
  labels:
    {{- include "payment.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "payment.serviceName" . }}:{{ .Values.service.port }}']
  restartPolicy: Never
